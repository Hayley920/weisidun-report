.mb.on{background:#00B96B;color:#fff;border-color:#00B96B;font-weight:700}

.kpi-unit{font-size:13px;font-weight:400;color:#ccc;margin-left:2px}
.kpi-sub{margin-top:5px;font-size:11px;color:#bbb}

.sec-hd-accent{width:4px;height:18px;border-radius:2px;margin-right:10px;flex-shrink:0}
.sec-hd h2{font-size:13px;font-weight:700;color:#111}
.sec-note{margin-left:auto;font-size:10.5px;color:#ccc}

td:first-child{text-align:left;font-weight:600;padding-left:16px;color:#333}

.chart-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cbox{background:#fafafa;border-radius:8px;padding:12px}
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.trend-item{background:#fafafa;border-radius:8px;padding:10px}
.trend-title{font-size:11.5px;font-weight:700;color:#333;margin-bottom:6px;padding-left:8px;border-left:3px solid #00B96B}

  return {zi,shou,zou,ziR:(zi/t*100).toFixed(2),shouR:(shou/t*100).toFixed(2),zouR:(zou/t*100).toFixed(2)};
}

function renderDetail() {
  const isAll = curMonth === 'all';

  document.getElementById('detail-note').textContent = (isAll?'Q1合计':MONTH_LABELS[curMonth]) + ' · 单位：万元 · 按合计排序';
  const agg = IND_NAMES.map((name, idx) => {

    months.forEach(m => { const r=ALL[m][name]||{zi:0,shou:0,zou:0}; zi+=r.zi; shou+=r.shou; zou+=r.zou; });
    const total = zi+shou+zou;
    return {name,idx,zi,shou,zou,total,
      ziR:total>0?(zi/total*100).toFixed(1):0,
      shouR:total>0?(shou/total*100).toFixed(1):0,
      zouR:total>0?(zou/total*100).toFixed(1):0};
  });
  agg.sort((a,b) => b.total - a.total);
  const rows = agg.map((r,i) => {
    const color = COLORS[r.idx];
    const zp = r.total>0?r.zi/r.total*100:0;
    const sp = r.total>0?r.shou/r.total*100:0;
    const zop = r.total>0?r.zou/r.total*100:0;
    return `<tr>
      <td class="td-rank">${i+1}</td>
      <td><span class="dot" style="background:${color}"></span>${r.name}</td>
      <td class="${r.zi>0?'td-amt':'td-zero'}">${fmt(r.zi)}</td><td class="td-pct">${r.ziR}%</td>
      <td class="${r.shou>0?'td-amt':'td-zero'}">${fmt(r.shou)}</td><td class="td-pct">${r.shouR}%</td>
      <td class="${r.zou>0?'td-amt':'td-zero'}">${fmt(r.zou)}</td><td class="td-pct">${r.zouR}%</td>
      <td class="td-total">${fmt(r.total)}</td>
      <td style="padding:6px 12px;min-width:88px">
        <div style="display:flex;height:5px;border-radius:3px;overflow:hidden">
          <div style="width:${zp}%;background:#00B96B"></div>
          <div style="width:${sp}%;background:#FF2442"></div>
          <div style="width:${zop}%;background:#4F6EF7"></div>
        </div>
        <div style="font-size:10px;color:#ccc;margin-top:2px">自${r.ziR}% 收${r.shouR}% 走${r.zouR}%</div>
      </td></tr>`;
  });
  let tz=0,ts=0,tzo=0; agg.forEach(r=>{tz+=r.zi;ts+=r.shou;tzo+=r.zou;});
  const ta = tz+ts+tzo;
  rows.push(`<tr class="tr-total"><td>—</td><td>合计</td>
    <td>${fmt(tz)}</td><td>${ta>0?(tz/ta*100).toFixed(1):0}%</td>
    <td>${fmt(ts)}</td><td>${ta>0?(ts/ta*100).toFixed(1):0}%</td>
    <td>${fmt(tzo)}</td><td>${ta>0?(tzo/ta*100).toFixed(1):0}%</td>
    <td>${fmt(ta)}</td><td></td></tr>`);
  document.getElementById('detail-body').innerHTML = rows.join('');
}
