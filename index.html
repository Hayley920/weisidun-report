.tab{display:none}.tab.on{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:relative;overflow:hidden}

.kpi.k-green::before{background:#4F6EF7}.kpi.k-orange::before{background:#4f6ef7}
.kpi-icon{font-size:22px;margin-bottom:4px}
.kpi-label{font-size:11px;color:#999;margin-bottom:3px}
.kpi-value{font-size:26px;font-weight:800;color:#111;line-height:1}
.kpi-unit{font-size:12px;font-weight:400;color:#bbb;margin-left:2px}
.kpi-sub{margin-top:4px;font-size:11px;color:#bbb}
.kpi.k-red .kpi-sub b{color:#00B96B}.kpi.k-blue .kpi-sub b{color:#FF2442}
.kpi.k-green .kpi-sub b{color:#4F6EF7}.kpi.k-orange .kpi-sub b{color:#4f6ef7}
.sec{background:#fff;border-radius:12px;padding:20px 22px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.sec-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.ic-r{background:#e6f9f2}.ic-b{background:#eef1ff}.ic-g{background:#edfaf6}.ic-o{background:#fff5eb}.ic-p{background:#f5f0ff}
.sec-hd h2{font-size:14px;font-weight:700;color:#111}
.sec-note{margin-left:auto;font-size:11px;color:#bbb}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
th{background:#f8f9fc;color:#555;font-weight:600;font-size:11px;padding:9px 10px;text-align:center;border-bottom:2px solid #eaecf2;white-space:nowrap}

td{padding:8px 10px;text-align:center;border-bottom:1px solid #f3f3f3}
td:first-child{text-align:left;font-weight:500;padding-left:14px}

.td-amt{font-weight:600;color:#111}.td-pct{color:#888;font-size:11px}
.td-zero{color:#d0d0d0}.td-total{font-weight:700;color:#00B96B}

.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.chart-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cbox{background:#f8f9fc;border-radius:9px;padding:10px}
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

function sw(name,btn){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  setTimeout(()=>Object.values(CHARTS).forEach(c=>c&&c.resize()),60);
}

function setMonth(m,btn){
  document.querySelectorAll('.mb').forEach(e=>e.classList.remove('on'));
  btn.classList.add('on');
  curMonth=m;
  renderTotal();
  renderDetail();
}

function getAllTotal(){

  return {zi,shou,zou,ziR:(zi/t*100).toFixed(2),shouR:(shou/t*100).toFixed(2),zouR:(zou/t*100).toFixed(2)};
}

      <div class="kpi-value">${W(d.shou)}<span class="kpi-unit">万</span></div>
      <div class="kpi-sub">占比 <b>${d.shouR}%</b></div></div>
    <div class="kpi k-orange"><div class="kpi-icon">🚀</div><div class="kpi-label">走量消耗</div>
      <div class="kpi-value">${W(d.zou)}<span class="kpi-unit">万</span></div>
      <div class="kpi-sub">占比 <b>${d.zouR}%</b></div></div>`;

  let rows=MONTHS.map(m=>{
    const r=ALL[m]._total;const t=r.zi+r.shou+r.zou;
    return `<tr><td>${MONTH_LABELS[m]}</td>
      <td class="td-amt">${W(r.zi)}</td><td class="td-pct">${r.ziR}%</td>
      <td class="td-amt">${W(r.shou)}</td><td class="td-pct">${r.shouR}%</td>
      <td class="td-amt">${W(r.zou)}</td><td class="td-pct">${r.zouR}%</td>
      <td class="td-total">${W(t)}</td></tr>`;
  });
  const at=getAllTotal();const atT=at.zi+at.shou+at.zou;
  rows.push(`<tr class="tr-total"><td>Q1合计</td>
    <td>${W(at.zi)}</td><td>${at.ziR}%</td>
    <td>${W(at.shou)}</td><td>${at.shouR}%</td>
    <td>${W(at.zou)}</td><td>${at.zouR}%</td>
    <td>${W(atT)}</td></tr>`);
  document.getElementById('total-body').innerHTML=rows.join('');

  const zi3=MONTHS.map(m=>+(ALL[m]._total.zi/10000).toFixed(2));
  const sh3=MONTHS.map(m=>+(ALL[m]._total.shou/10000).toFixed(2));
  const zo3=MONTHS.map(m=>+(ALL[m]._total.zou/10000).toFixed(2));
  const tot3=MONTHS.map(m=>+((ALL[m]._total.zi+ALL[m]._total.shou+ALL[m]._total.zou)/10000).toFixed(2));
  if(!CHARTS.mbar)CHARTS.mbar=echarts.init(document.getElementById('c-monthly-bar'));
  CHARTS.mbar.setOption({
    title:{text:'月度消耗结构对比（万元）',left:'center',top:4,textStyle:{fontSize:12,fontWeight:700,color:'#333'}},
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
    legend:{bottom:0,data:['一代自运营','其他收量','走量消耗'],itemWidth:10,itemHeight:10,textStyle:{fontSize:11}},
    grid:{left:50,right:10,bottom:40,top:44},
    xAxis:{type:'category',data:['1月','2月','3月']},
    yAxis:{type:'value',name:'万元'},
    series:[
      {name:'一代自运营',type:'bar',stack:'S',data:zi3,itemStyle:{color:'#00B96B'}},
      {name:'其他收量',type:'bar',stack:'S',data:sh3,itemStyle:{color:'#FF2442'}},
      {name:'走量消耗',type:'bar',stack:'S',data:zo3,itemStyle:{color:'#4F6EF7'},
        label:{show:true,position:'top',formatter:p=>tot3[p.dataIndex]+'万',fontSize:10,fontWeight:700,color:'#555'}},
    ]
  });

  const pd=isAll?at:d;
  if(!CHARTS.mpie)CHARTS.mpie=echarts.init(document.getElementById('c-monthly-pie'));
  CHARTS.mpie.setOption({
    title:{text:label+'消耗结构',left:'center',top:4,textStyle:{fontSize:12,fontWeight:700,color:'#333'}},
    tooltip:{trigger:'item',formatter:'{b}: {c}万元 ({d}%)'},
    legend:{bottom:0,itemWidth:10,itemHeight:10,textStyle:{fontSize:11}},
    series:[{type:'pie',radius:['38%','65%'],center:['50%','46%'],
      label:{formatter:'{b}\n{d}%',fontSize:11,lineHeight:16},
      data:[
        {value:+(pd.zi/10000).toFixed(2),name:'一代自运营',itemStyle:{color:'#00B96B'}},
        {value:+(pd.shou/10000).toFixed(2),name:'其他收量',itemStyle:{color:'#FF2442'}},
        {value:+(pd.zou/10000).toFixed(2),name:'走量消耗',itemStyle:{color:'#4F6EF7'}},
      ]

  });
}

function renderDetail(){
  const isAll=curMonth==='all';
  const months=isAll?MONTHS:[curMonth];
  document.getElementById('detail-note').textContent=(isAll?'Q1合计':MONTH_LABELS[curMonth])+' | 单位：万元 | 按合计排序';
  const agg=IND_NAMES.map((name,idx)=>{
    let zi=0,shou=0,zou=0;
    months.forEach(m=>{const r=ALL[m][name]||{zi:0,shou:0,zou:0};zi+=r.zi;shou+=r.shou;zou+=r.zou;});
    const total=zi+shou+zou;
    return {name,idx,zi,shou,zou,total,
      ziR:total>0?(zi/total*100).toFixed(1):0,
      shouR:total>0?(shou/total*100).toFixed(1):0,
      zouR:total>0?(zou/total*100).toFixed(1):0};
  });
  agg.sort((a,b)=>b.total-a.total);
  let rows=agg.map((r,i)=>{
    const color=COLORS[r.idx];
    const zp=r.total>0?r.zi/r.total*100:0;
    const sp=r.total>0?r.shou/r.total*100:0;
    const zop=r.total>0?r.zou/r.total*100:0;
    return `<tr>
      <td class="td-rank">${i+1}</td>
      <td><span class="dot" style="background:${color}"></span>${r.name}</td>
      <td class="${r.zi>0?'td-amt':'td-zero'}">${fmt(r.zi)}</td><td class="td-pct">${r.ziR}%</td>
      <td class="${r.shou>0?'td-amt':'td-zero'}">${fmt(r.shou)}</td><td class="td-pct">${r.shouR}%</td>
      <td class="${r.zou>0?'td-amt':'td-zero'}">${fmt(r.zou)}</td><td class="td-pct">${r.zouR}%</td>
      <td class="td-total">${fmt(r.total)}</td>
      <td style="padding:5px 10px;min-width:100px">
        <div style="display:flex;height:6px;border-radius:3px;overflow:hidden">
          <div style="width:${zp}%;background:#00B96B"></div>
          <div style="width:${sp}%;background:#FF2442"></div>
          <div style="width:${zop}%;background:#4F6EF7"></div>
        </div>
        <div style="font-size:10px;color:#bbb;margin-top:2px">自${r.ziR}% 收${r.shouR}% 走${r.zouR}%</div>
      </td></tr>`;
  });
  let tz=0,ts=0,tzo=0;agg.forEach(r=>{tz+=r.zi;ts+=r.shou;tzo+=r.zou;});
  const ta=tz+ts+tzo;
  rows.push(`<tr class="tr-total"><td>—</td><td>合计</td>
    <td>${fmt(tz)}</td><td>${ta>0?(tz/ta*100).toFixed(1):0}%</td>
    <td>${fmt(ts)}</td><td>${ta>0?(ts/ta*100).toFixed(1):0}%</td>
    <td>${fmt(tzo)}</td><td>${ta>0?(tzo/ta*100).toFixed(1):0}%</td>
    <td>${fmt(ta)}</td><td></td></tr>`);
  document.getElementById('detail-body').innerHTML=rows.join('');
}

function renderTrend(){
  // 行业小图：柱=消耗(万,左轴) + 实线=自运营占比%(右轴)
  const grid=document.getElementById('trend-grid');
  grid.innerHTML='';
  IND_NAMES.forEach((name,idx)=>{
    const color=COLORS[idx];
    const div=document.createElement('div');
    div.className='trend-item';
    const cid='tc'+idx;
    div.innerHTML=`<div class="trend-title">${name}</div><div id="${cid}" style="height:170px"></div>`;
    grid.appendChild(div);
    const c=echarts.init(document.getElementById(cid));
    CHARTS['i'+idx]=c;

    const ziData=MONTHS.map(m=>+(ALL[m][name].zi/10000).toFixed(2));
    const ziRData=MONTHS.map(m=>+ALL[m][name].ziR);

    c.setOption({
      tooltip:{
        trigger:'axis',
        formatter:params=>{
          let s=`<b>${params[0].axisValue}</b><br/>`;
          params.forEach(p=>{
            const unit=p.seriesName.includes('%')?'%':'万';
            s+=`${p.marker}${p.seriesName}：${p.value}${unit}<br/>`;
          });
          return s;
        }
      },
      legend:{top:0,right:0,itemWidth:8,itemHeight:8,textStyle:{fontSize:9},
        data:[{name:'消耗(万)',icon:'rect'},{name:'自运营%',icon:'line'}]
      },
      grid:{left:38,right:38,bottom:22,top:26},
      xAxis:{type:'category',data:['1月','2月','3月'],axisLabel:{fontSize:10}},
      yAxis:[
        {type:'value',name:'万',nameTextStyle:{fontSize:9},axisLabel:{fontSize:9},splitNumber:3,position:'left'},
        {type:'value',name:'%',nameTextStyle:{fontSize:9},axisLabel:{fontSize:9,formatter:v=>v+'%'},
          min:0,max:100,splitNumber:4,position:'right',
          axisLine:{show:false},axisTick:{show:false},splitLine:{show:false}},
      ],
      series:[
        {name:'消耗(万)',type:'bar',yAxisIndex:0,data:ziData,itemStyle:{color,opacity:0.85},
          label:{show:true,position:'top',formatter:p=>p.value>0?p.value:'',fontSize:9,color:'#555'}},
        {name:'自运营%',type:'line',yAxisIndex:1,data:ziRData,smooth:true,
          symbol:'circle',symbolSize:5,
          lineStyle:{color:'#00B96B',width:2},itemStyle:{color:'#00B96B'},
          label:{show:true,position:'top',formatter:p=>p.value>0?p.value+'%':'',fontSize:9,color:'#00B96B'}},
      ]
    });
  });
}

renderTotal();
renderDetail();
renderTrend();
window.addEventListener('resize',()=>Object.values(CHARTS).forEach(c=>c&&c.resize()));
</script>
