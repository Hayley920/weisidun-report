// 所有可用月份（排序）
const ALL_MONTHS = Object.keys(ALL).sort();

// 月份标签
function mLabel(m){ return parseInt(m.split('-')[1]) + '月'; }

// === 选择器状态 ===
let preset = 'all';  // 当前快捷周期
let selMonths = [...ALL_MONTHS];  // 当前选中月份

// === 图表实例 ===
const CHARTS = {};

// === 工具函数 ===
const W = v => (v/10000).toFixed(2);
const fmt = v => v>0 ? W(v) : '0.00';

// 汇总指定月份
function agg(months){
  let zi=0,erdai=0,shou=0,zou=0;
  const ind={};
  months.forEach(m=>{
    const d=ALL[m]; if(!d) return;
    zi+=d._total.zi; erdai+=d._total.erdai||0; shou+=d._total.shou; zou+=d._total.zou;
    IND_NAMES.forEach(name=>{
      if(!ind[name]) ind[name]={zi:0,erdai:0,shou:0,zou:0};
      const r=d[name]||{zi:0,erdai:0,shou:0,zou:0};
      ind[name].zi+=r.zi; ind[name].erdai+=r.erdai||0; ind[name].shou+=r.shou; ind[name].zou+=r.zou;
    });
  });
  const total=zi+erdai+shou+zou;
  return {
    _total:{zi,erdai,shou,zou,total,
      ziR:total>0?(zi/total*100).toFixed(2):0,
      erdaiR:total>0?(erdai/total*100).toFixed(2):0,
      shouR:total>0?(shou/total*100).toFixed(2):0,
      zouR:total>0?(zou/total*100).toFixed(2):0},
    industries:ind
  };
}

function presetLabel(p){
  const labels={cur:'本月',m3:'近3月',m6:'近6月',ytd:'今年',all:'所有月份'};
  return labels[p]||'自定义';
}

function resolveMonths(preset){
  if(!ALL_MONTHS.length) return [];
  if(preset==='all') return [...ALL_MONTHS];
  if(preset==='cur') return [ALL_MONTHS[ALL_MONTHS.length-1]];
  if(preset==='m3') return ALL_MONTHS.slice(-3);
  if(preset==='m6') return ALL_MONTHS.slice(-6);
  if(preset==='ytd'){
    const y=ALL_MONTHS[ALL_MONTHS.length-1].split('-')[0];
    return ALL_MONTHS.filter(m=>m.startsWith(y));
  }
  return [...selMonths];
}

// === UI ===
function buildMonthButtons(){
  const c=document.getElementById('month-scroll');
  let html='<button class="mbtn all-btn'+(preset==='all'?' sel':'')+'" onclick="setPreset(\'all\',this)">所有</button>';
  ALL_MONTHS.forEach(m=>{
    const sel=selMonths.includes(m);
    html+=`<button class="mbtn${sel?' sel':''}" data-month="${m}" onclick="toggleMonth('${m}',this)">${mLabel(m)}</button>`;
  });
  c.innerHTML=html;
}

function updatePresetBtns(){
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.classList.toggle('on', b.dataset.preset===preset);
  });
}

function setPreset(p, btn){
  preset=p;
  selMonths=resolveMonths(p);
  updatePresetBtns();
  buildMonthButtons();
  render();
}

function toggleMonth(m, btn){
  // 清除预设
  preset='custom';
  updatePresetBtns();

  if(selMonths.includes(m)){
    selMonths=selMonths.filter(x=>x!==m);
  } else {
    selMonths.push(m);
    selMonths.sort();
  }
  btn.classList.toggle('sel');
  render();
}

function sw(name,btn){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  setTimeout(()=>Object.values(CHARTS).forEach(c=>c&&c.resize()),60);
}

    ]
  });

  // 饼图
  if(!CHARTS.mpie)CHARTS.mpie=echarts.init(document.getElementById('c-monthly-pie'));
  CHARTS.mpie.setOption({
    title:{text:(months.length===1?mLabel(months[0]):modeLabel)+' 消耗结构',left:'center',top:4,textStyle:{fontSize:12,fontWeight:700,color:'#333'}},
    tooltip:{trigger:'item',formatter:'{b}: {c}万元 ({d}%)'},
    legend:{bottom:0,itemWidth:10,itemHeight:10,textStyle:{fontSize:11}},
    series:[{type:'pie',radius:['38%','65%'],center:['50%','46%'],
      label:{formatter:'{b}\n{d}%',fontSize:11,lineHeight:16},
      data:[
        {value:+(t.zi/10000).toFixed(2),name:'一代自运营',itemStyle:{color:'#00B96B'}},
        {value:+((t.erdai||0)/10000).toFixed(2),name:'二代自运营',itemStyle:{color:'#9c27b0'}},
        {value:+(t.shou/10000).toFixed(2),name:'其他收量',itemStyle:{color:'#FF2442'}},
        {value:+(t.zou/10000).toFixed(2),name:'走量消耗',itemStyle:{color:'#4F6EF7'}},
      ]
    }]
  });

  // 行业拆分
  const indAgg=d.industries;
  document.getElementById('detail-note').textContent=modeLabel+' | 按合计排序';
  const indList=IND_NAMES.map((name,idx)=>{
    const r=indAgg[name]||{zi:0,shou:0,zou:0};
    const total=r.zi+r.shou+r.zou;
    return {name,idx,...r,total,
      ziR:total>0?(r.zi/total*100).toFixed(1):0,
      shouR:total>0?(r.shou/total*100).toFixed(1):0,
      zouR:total>0?(r.zou/total*100).toFixed(1):0};
  });
  indList.sort((a,b)=>b.total-a.total);
  let irows=indList.map((r,i)=>{
    const color=COLORS[r.idx];
    const zp=r.total>0?r.zi/r.total*100:0;
    const ep=r.total>0?(r.erdai||0)/r.total*100:0;
    const sp=r.total>0?r.shou/r.total*100:0;
    const zop=r.total>0?r.zou/r.total*100:0;
    return `<tr>
      <td class="td-rank">${i+1}</td>
      <td><span class="dot" style="background:${color}"></span>${r.name}</td>
      <td class="${r.zi>0?'td-amt':'td-zero'}">${fmt(r.zi)}</td><td class="td-pct">${r.ziR}%</td>
      <td class="${(r.erdai||0)>0?'td-amt':'td-zero'}">${fmt(r.erdai||0)}</td><td class="td-pct">${r.erdaiR||0}%</td>
      <td class="${r.shou>0?'td-amt':'td-zero'}">${fmt(r.shou)}</td><td class="td-pct">${r.shouR}%</td>
      <td class="${r.zou>0?'td-amt':'td-zero'}">${fmt(r.zou)}</td><td class="td-pct">${r.zouR}%</td>
      <td class="td-total">${fmt(r.total)}</td>
      <td style="padding:5px 10px;min-width:100px">
        <div style="display:flex;height:6px;border-radius:3px;overflow:hidden">
          <div style="width:${zp}%;background:#00B96B"></div>
          <div style="width:${ep}%;background:#9c27b0"></div>
          <div style="width:${sp}%;background:#FF2442"></div>
          <div style="width:${zop}%;background:#4F6EF7"></div>
        </div>
        <div style="font-size:10px;color:#bbb;margin-top:2px">自${r.ziR}% 二${r.erdaiR||0}% 收${r.shouR}% 走${r.zouR}%</div>
      </td></tr>`;
  });
  let tz=0,te=0,ts=0,tzo=0;
  indList.forEach(r=>{tz+=r.zi;te+=(r.erdai||0);ts+=r.shou;tzo+=r.zou;});
  const ta=tz+te+ts+tzo;
  irows.push(`<tr class="tr-total"><td>—</td><td>合计</td>
    <td>${fmt(tz)}</td><td>${ta>0?(tz/ta*100).toFixed(1):0}%</td>
    <td>${fmt(te)}</td><td>${ta>0?(te/ta*100).toFixed(1):0}%</td>
    <td>${fmt(ts)}</td><td>${ta>0?(ts/ta*100).toFixed(1):0}%</td>
    <td>${fmt(tzo)}</td><td>${ta>0?(tzo/ta*100).toFixed(1):0}%</td>
    <td>${fmt(ta)}</td><td></td></tr>`);
  document.getElementById('detail-body').innerHTML=irows.join('');

  // 行业趋势（始终展示 ALL_MONTHS）
  const grid=document.getElementById('trend-grid');
  grid.innerHTML='';
  IND_NAMES.forEach((name,idx)=>{
    const color=COLORS[idx];
    const div=document.createElement('div');
    div.className='trend-item';
    const cid='tc'+idx;
    div.innerHTML=`<div class="trend-title">${name}</div><div id="${cid}" style="height:170px"></div>`;
    grid.appendChild(div);
    const c=echarts.init(document.getElementById(cid));
    CHARTS['i'+idx]=c;
    const ziD=ALL_MONTHS.map(m=>+(ALL[m][name].zi/10000).toFixed(2));
    const ziRD=ALL_MONTHS.map(m=>+ALL[m][name].ziR);
    c.setOption({
      tooltip:{trigger:'axis',formatter:ps=>{
        let s=`<b>${ps[0].axisValue}</b><br/>`;
        ps.forEach(p=>s+=`${p.marker}${p.seriesName}：${p.value}${p.seriesName.includes('%')?'%':'万'}<br/>`);
        return s;
      }},
      legend:{top:0,right:0,itemWidth:8,itemHeight:8,textStyle:{fontSize:9},data:[{name:'消耗(万)',icon:'rect'},{name:'自运营%',icon:'line'}]},
      grid:{left:38,right:38,bottom:22,top:26},
      xAxis:{type:'category',data:ALL_MONTHS.map(m=>mLabel(m)),axisLabel:{fontSize:10}},
      yAxis:[
        {type:'value',name:'万',nameTextStyle:{fontSize:9},axisLabel:{fontSize:9},splitNumber:3},
        {type:'value',name:'%',nameTextStyle:{fontSize:9},axisLabel:{fontSize:9,formatter:v=>v+'%'},min:0,max:100,splitNumber:4,position:'right',axisLine:{show:false},axisTick:{show:false},splitLine:{show:false}},
      ],
      series:[
        {name:'消耗(万)',type:'bar',yAxisIndex:0,data:ziD,itemStyle:{color,opacity:0.85},label:{show:true,position:'top',formatter:p=>p.value>0?p.value:'',fontSize:9}},
        {name:'自运营%',type:'line',yAxisIndex:1,data:ziRD,smooth:true,symbol:'circle',symbolSize:5,lineStyle:{color:'#00B96B',width:2},itemStyle:{color:'#00B96B'},label:{show:true,position:'top',formatter:p=>p.value>0?p.value+'%':'',fontSize:9,color:'#00B96B'}},
      ]
    });
  });
}

// === 初始化 ===
buildMonthButtons();
updatePresetBtns();
render();
window.addEventListener('resize',()=>Object.values(CHARTS).forEach(c=>c&&c.resize()));
</script>
